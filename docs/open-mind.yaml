project: t3-hearst
repo: t3-hearst
type: phased
docs:
  brief: docs/brief.md
  discovery-log: docs/discovery-log.md
  sessions: docs/sessions/
  captures: docs/captures.md
tracked_files:
  - README.md
  - docs/open-mind.yaml
  - docs/brief.md
  - docs/captures.md
  - docs/discovery-log.md
  - docs/sow/sow-v7-20251118.md
  - docs/sow/sow-v2-20260406.md
  - docs/sessions/*.md
  - docs/plans/*.md
  - docs/fabric-toolkit/README.md
  - docs/fabric-toolkit/MANIFEST.md
  - docs/fabric-toolkit/PATTERN.md
  - docs/fabric-toolkit/UPSTREAM.md
tags:
  - data-engineering
  - microsoft-fabric
  - power-bi
  - medallion-architecture
execution:
  backend: task-tool
  max_parallel: 6
  quality_gate: full
  review_escalation:
    files_threshold: 8
    lines_threshold: 500
    security_patterns:
      - "**/auth/**"
      - "**/crypto/**"
      - "**/permissions/**"
